name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: ci-test-session-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm run lint:web

      - name: Typecheck
        run: pnpm run typecheck:web

      - name: Test
        run: pnpm run test:run

      - name: Mobile Node Guard
        run: pnpm --filter @fulbito/mobile exec node ./scripts/check-node-version.mjs

      - name: Mobile Targeted Test Guard
        run: pnpm --filter @fulbito/mobile test -- ConfiguracionScreen.actions.test.tsx

      - name: Build
        run: pnpm run build:web
